# Dữ liệu được thu thập từ năm 2000 đến nay bởi những lý do sau 
# 1. Trước những năm 2000, việc thu thậ dữ liệu tại nhiều quốc gia đang phát triển được thực hiẹn thru công dẫn đến sai số hệ thống rất lớn
# 2. Nếu tính đến chỉ số Internet: Chỉ số này hầu như bằng 0 
# 3. Trước 2004, chúng kiến nhiều sự thay đổi về phân phối của dữ liệu kinh tế, không đảm bảo tính dừng (stationary)

dataset_metadata:
    name: 'Worldbank_data'
    description: 'Dữ liệu phân bố nguồn lực của các quốc gia trên thế giới'

dataset_statistics:
    total_observations: Số thực thể x Số bước thời gian
    temporal_observations: # Tần suất lấy mẫu
    time_span:
        start_time: Thời điểm bắt đầu của dữ liệu
        end_time: Thời điểm kết thúc của dữ liệu    
    is_equidistant: true # Dữ liệu có được lấy mẫu ở khoảng thời gian đều đặn hay không

    statistical_properties:
        is_stationary:
        has_seasonality:
        peridodicity: Chu kỳ lặp lại

features:
    - name: 
    description : ''
     type:
     distribution: 'normal' # Giả định phân phối chuẩn
     parameters:
      mean:
      std_dev:
    unit: 

    - name:
    type
    value: 
    probability_mass: # Xác suất tiên nghiệm (Prior)
    0: 0.7 
    1: 0.3

