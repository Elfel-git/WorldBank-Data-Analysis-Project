pipeline:
  name: WorldBank Economic Data Preprocessing Pipeline
  version: "2.0"
  input_folder: "../nam"
  output_folder: "./outputs"
  save_intermediate: true
  random_seed: 42

diagnostics:
  correlation_threshold: 0.8
  distribution_bins: 30
  missing_threshold: 0.15
  outlier_detection_report: true
  skewness_threshold: 1.0
  kurtosis_threshold: 3.0

phase1_cleaning:
  drop_duplicates: true

  outlier_handling:
    enabled: true
    method: percentile_clip
    lower_quantile: 0.01
    upper_quantile: 0.99

    feature_specific:
      GDP per capita (constant 2015 US$):
        method: percentile_clip
        lower_quantile: 0.01
        upper_quantile: 0.99

      Foreign direct investment net inflows (% of GDP):
        method: percentile_clip
        lower_quantile: 0.01
        upper_quantile: 0.99

      Domestic credit to private sector (% of GDP):
        method: percentile_clip
        lower_quantile: 0.01
        upper_quantile: 0.99

phase2_transformation:
  log_transform:
    enabled: true
    add_constant: 1.0
    base: "natural"

    features:
      - GDP per capita (constant 2015 US$)
      - Domestic credit to private sector (% of GDP)

  power_transform:
    enabled: true
    method: yeo-johnson

    features:
      - Foreign direct investment net inflows (% of GDP)
      - Agriculture forestry and fishing value added (% of GDP)
      - Industry (including construction) value added (% of GDP)

phase3_imputation:
  method: knn
  n_neighbors: 5
  weight_type: distance

  exclude_features:
    - Year

  feature_groups:
    economic_features:
      - GDP per capita (constant 2015 US$)
      - Domestic credit to private sector (% of GDP)
      - Foreign direct investment net inflows (% of GDP)

    infrastructure_features:
      - Access to electricity (% of population)
      - Individuals using the Internet (% of population)

    sector_features:
      - Agriculture forestry and fishing value added (% of GDP)
      - Industry (including construction) value added (% of GDP)
      - Services value added (% of GDP)

phase4_scaling:
  method: robust
  quantile_range: [25, 75]

  exclude_features:
    - Year

validation:
  domain_rules:
    sector_sum_check:
      enabled: true
      features:
        - Agriculture forestry and fishing value added (% of GDP)
        - Industry (including construction) value added (% of GDP)
        - Services value added (% of GDP)
      expected_sum: 100
      tolerance: 5

  missing_after_processing_threshold: 0.0
  outlier_recheck: true